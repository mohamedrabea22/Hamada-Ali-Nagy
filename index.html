<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text To Speech Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Text To Speech Pro</h1>

    <textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>

    <label>اختار الصوت:</label>
    <select id="voiceSelect"></select>

    <div class="controls">
        <label>السرعة: <span id="rateValue">1</span></label>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

        <label>النبرة: <span id="pitchValue">1</span></label>
        <input type="range" id="pitch" min="0" max="2" step="0.1" value="1">
    </div>

    <button id="speakBtn">تشغيل الصوت</button>
</div>

<script src="main.js"></script>
</body>
</html>
