<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic TTS Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="title">محول النص إلى كلام</h1>

    <textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>

    <label class="lbl">نوع الصوت:</label>
    <select id="voiceType">
        <option value="male">ذكر</option>
        <option value="female">أنثى</option>
    </select>

    <div class="slider-group">
        <div>
            <label class="lbl">السرعة:</label>
            <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
        </div>
        <div>
            <label class="lbl">النبرة:</label>
            <input type="range" id="pitch" min="0.5" max="2" value="1" step="0.1">
        </div>
    </div>

    <div class="btns">
        <button id="speakBtn">تشغيل</button>
        <button id="downloadBtn">تحميل الصوت</button>
    </div>

    <canvas id="wave"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/gh/akmamun/arabic-tts/tts.min.js"></script>
<script src="main.js"></script>

</body>
</html>
